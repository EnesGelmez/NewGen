# -----------------------------------------------------------------------------
# NexusIO Platform - local development infrastructure
# -----------------------------------------------------------------------------
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v   (drops all volumes / data)
# -----------------------------------------------------------------------------

name: nexusio

services:
  # -- PostgreSQL 16 -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nexusio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-nexus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nexus} -d $${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -- Go Backend API ----------------------------------------------------------
  nexusio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexusio_backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT:           ${PORT:-8080}
      DATABASE_URL:   postgres://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_secret}@postgres:5432/${POSTGRES_DB:-nexus}?sslmode=disable
      JWT_SECRET:     ${JWT_SECRET:-change-me-in-production-super-secret-key}
      JWT_TTL_HOURS:  ${JWT_TTL_HOURS:-24}
      CORS_ORIGIN:    ${CORS_ORIGIN:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  # -- React Frontend (nginx + proxy) ------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        # Empty = browser uses same origin; nginx proxies /api/ to nexusio internally.
        # Set VITE_API_URL=https://api.example.com for external deployments.
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: nexusio_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - nexusio

  # -- pgAdmin 4 ---------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexusio_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@nexus.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: